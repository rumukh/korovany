<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect rx='12' width='64' height='64' fill='%23b11f4b'/><path d='M16 12v40h8V36l16 16h11L31 31l18-19H38L24 28V12z' fill='white'/></svg>"
    />
    <script>
      (() => {
        const param = new URLSearchParams(window.location.search).get("scoutTheme");
        const theme =
          param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Коровaны — процедурный 3D-экшон про эльфов, дворцовую охрану и злодея."
    />

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
